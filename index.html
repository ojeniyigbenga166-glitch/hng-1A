<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Card Component</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Manager</h1>
        </header>

        <main>
            <article class="todo-card" data-testid="test-todo-card">
                <!-- PRIORITY INDICATOR -->
                <div class="todo-priority-indicator-wrapper" data-testid="test-todo-priority-indicator">
                    <div class="priority-indicator"></div>
                </div>

                <!-- OVERDUE INDICATOR -->
                <div class="todo-overdue-indicator" data-testid="test-todo-overdue-indicator" style="display: none;">
                    ⚠️ Overdue
                </div>

                <!-- VIEW MODE (default) -->
                <div class="todo-view-mode" data-testid="test-todo-view-mode">
                    <!-- Title -->
                    <div class="todo-header">
                        <h2 class="todo-title" data-testid="test-todo-title">
                            Complete project documentation
                        </h2>
                        <span class="todo-priority" data-testid="test-todo-priority" aria-label="Priority: High">
                            <span class="priority-badge high">High</span>
                        </span>
                    </div>

                    <!-- Expand/Collapse Toggle -->
                    <div class="todo-expand-header">
                        <button 
                            class="expand-toggle"
                            data-testid="test-todo-expand-toggle"
                            aria-expanded="false"
                            aria-controls="todo-collapsible-section"
                            aria-label="Expand/collapse task details"
                            title="Click to expand or collapse"
                        >
                            <span class="expand-icon">▼</span>
                        </button>
                    </div>

                    <!-- COLLAPSIBLE SECTION: Description, Dates, Status -->
                    <div 
                        class="todo-collapsible-section expanded"
                        id="todo-collapsible-section"
                        data-testid="test-todo-collapsible-section"
                    >
                        <!-- Description -->
                        <p class="todo-description" data-testid="test-todo-description">
                            Write comprehensive documentation for the API endpoints, including examples and best practices.
                        </p>

                        <!-- Due Date & Time Remaining -->
                        <div class="todo-dates">
                            <time class="todo-due-date" data-testid="test-todo-due-date" datetime="2026-02-18T18:00:00Z">
                                📅 Due Feb 18, 2026
                            </time>
                            <div class="todo-time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">
                                ⏱️ Due in 5 days
                            </div>
                        </div>

                        <!-- Status Control -->
                        <div class="todo-status-control-wrapper" data-testid="test-todo-status-control">
                            <label for="status-select" class="status-label">Status:</label>
                            <select id="status-select" class="status-select" aria-label="Task status">
                                <option value="pending">Pending</option>
                                <option value="in-progress">In Progress</option>
                                <option value="done">Done</option>
                            </select>
                        </div>

                        <!-- Status & Completion -->
                        <div class="todo-status-section">
                            <div class="status-wrapper">
                                <span class="todo-status" data-testid="test-todo-status" aria-label="Current status: Pending">
                                    <span class="status-badge pending">Pending</span>
                                </span>
                            </div>
                            
                            <div class="checkbox-wrapper">
                                <input 
                                    type="checkbox" 
                                    id="todo-complete-checkbox"
                                    class="todo-complete-toggle"
                                    data-testid="test-todo-complete-toggle"
                                    aria-label="Mark task as complete"
                                >
                                <label for="todo-complete-checkbox" class="checkbox-label">
                                    Mark as done
                                </label>
                            </div>
                        </div>

                        <!-- Tags / Categories -->
                        <div class="tags-container">
                            <ul class="todo-tags" data-testid="test-todo-tags" role="list">
                                <li role="listitem">
                                    <span class="tag" data-testid="test-todo-tag-work">
                                        💼 Work
                                    </span>
                                </li>
                                <li role="listitem">
                                    <span class="tag" data-testid="test-todo-tag-urgent">
                                        🚀 Urgent
                                    </span>
                                </li>
                                <li role="listitem">
                                    <span class="tag" data-testid="test-todo-tag-documentation">
                                        📝 Documentation
                                    </span>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="todo-actions">
                        <button 
                            class="btn btn-edit" 
                            data-testid="test-todo-edit-button"
                            aria-label="Edit task"
                        >
                            ✏️ Edit
                        </button>
                        <button 
                            class="btn btn-delete" 
                            data-testid="test-todo-delete-button"
                            aria-label="Delete task"
                        >
                            🗑️ Delete
                        </button>
                    </div>
                </div>

                <!-- EDIT MODE (hidden by default) -->
                <form class="todo-edit-mode" data-testid="test-todo-edit-form" style="display: none;">
                    <div class="form-group">
                        <label for="edit-title" class="form-label">Title</label>
                        <input 
                            type="text" 
                            id="edit-title"
                            class="form-input"
                            data-testid="test-todo-edit-title-input"
                            placeholder="Task title"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="edit-description" class="form-label">Description</label>
                        <textarea 
                            id="edit-description"
                            class="form-textarea"
                            data-testid="test-todo-edit-description-input"
                            placeholder="Task description"
                            rows="4"
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="edit-priority" class="form-label">Priority</label>
                        <select 
                            id="edit-priority"
                            class="form-select"
                            data-testid="test-todo-edit-priority-select"
                            aria-label="Priority level"
                        >
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="edit-due-date" class="form-label">Due Date</label>
                        <input 
                            type="datetime-local" 
                            id="edit-due-date"
                            class="form-input"
                            data-testid="test-todo-edit-due-date-input"
                            required
                        >
                    </div>

                    <div class="form-actions">
                        <button 
                            type="submit" 
                            class="btn btn-save"
                            data-testid="test-todo-save-button"
                            aria-label="Save changes"
                        >
                            💾 Save
                        </button>
                        <button 
                            type="button" 
                            class="btn btn-cancel"
                            data-testid="test-todo-cancel-button"
                            aria-label="Cancel editing"
                        >
                            ❌ Cancel
                        </button>
                    </div>
                </form>
            </article>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
